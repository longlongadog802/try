<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Mie Anniversary</title>
    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/longlongadog802/try/main/1000038329.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="三重五週年">
    <link rel="icon" sizes="192x192" href="https://raw.githubusercontent.com/longlongadog802/try/main/1000038329.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fef9f6; margin: 0; }
        
        /* 恢復你原本的精美視覺設定 */
        .hero-section {
            width: 100%;
            height: 300px;
            background: url('https://raw.githubusercontent.com/longlongadog802/try/main/1000038329.png') no-repeat center center;
            background-size: cover;
        }
        .main-card {
            background: white;
            border-radius: 30px 30px 0 0;
            margin-top: -30px;
            padding: 25px;
            min-height: 500px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="hero-section"></div>

<div class="main-card">
    <h1 class="text-2xl font-bold text-center text-orange-800">五週年 • 三重之旅</h1>
    <p class="text-center italic text-gray-500 mt-2 handwriting">「在伊勢的微風中，圓圓地迎接第五年。」</p>

    <div class="mt-8 space-y-6">
        <div class="border-l-2 border-orange-200 pl-4">
            <span class="text-orange-600 font-bold text-sm">DAY 1 - 11.25</span>
            <h3 class="font-bold">開啟週年之旅</h3>
            <p class="text-sm text-gray-400">桃園機場 → 中部國際機場 → 名古屋榮區</p>
        </div>
    </div>
</div>

</body>
</html>
