<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Mie Anniversary</title>
    <style>
        :root { --main-brown: #8d6e63; --accent-orange: #d35400; --bg-cream: #fef9f6; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: var(--bg-cream); margin: 0; padding: 15px; color: #444; }
        .app-container { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        .hero-img { width: 100%; display: block; }
        .content { padding: 20px; text-align: center; }
        h1 { color: var(--accent-orange); font-size: 1.4rem; margin: 10px 0; }
        .quote { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 20px; line-height: 1.6; }
        .timeline { text-align: left; padding: 0 10px; border-left: 2px dashed #eee; margin-left: 15px; }
        .event { position: relative; margin-bottom: 25px; padding-left: 20px; }
        .event::before { content: ''; position: absolute; left: -26px; top: 5px; width: 10px; height: 10px; background: var(--accent-orange); border-radius: 50%; }
        .time { font-weight: bold; color: var(--accent-orange); font-size: 0.85rem; display: block; }
        .title { font-weight: bold; font-size: 1rem; color: #333; margin: 2px 0; }
        .desc { font-size: 0.8rem; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="app-container">
        <img src="https://raw.githubusercontent.com/longlongadog802/try/main/1000038329.png" class="hero-img">
        <div class="content">
            <h1>五週年 • 三重之旅</h1>
            <p class="quote">「在伊勢的微風中，我們圓圓的迎接第五年。」</p>
            
            <div class="timeline">
                <div class="event">
                    <span class="time">06:45</span>
                    <p class="title">🚗 桃園機場 T1 報到</p>
                    <p class="desc">IT206 準備起飛，五週年之旅正式開始！</p>
                </div>
                <div class="event">
                    <span class="time">08:45-12:25</span>
                    <p class="title">✈️ 抵達中部國際機場 (NGO)</p>
                    <p class="desc">領取租車，開啟五天四夜三重行程</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
